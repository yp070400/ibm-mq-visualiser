spring:
  application:
    name: mq-monitor

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.example.mqmonitor: INFO
    com.ibm.mq: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ─────────────────────────────────────────────
# IBM MQ Connection (IBM Spring Boot Starter convention)
# ─────────────────────────────────────────────

ibm:
  mq:
    queue-manager: QM1
    conn-name: "localhost(1414)"
    channel: DEV.ADMIN.SVRCONN
    user: admin
    password: passw0rd

    # Additional queue managers (optional):
    # additional-connections:
    #   - queue-manager: QM2
    #     conn-name: "host2(1414)"
    #     channel: PROD.SVRCONN
    #     user: admin
    #     password: passw0rd

# ─────────────────────────────────────────────
# MQ Monitor Settings
# ─────────────────────────────────────────────

mq:
  monitor:
    polling-interval-seconds: 30
    thread-pool-size: 8
    collection-timeout-seconds: 20
    warning-threshold-percent: 70
    critical-threshold-percent: 90
    queue-pattern: "TEST.*"
    exclude-system-queues: true
